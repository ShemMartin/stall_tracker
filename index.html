<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>StallTrack</title>
<meta name="description" content="Stall Rent Management System">
<meta name="theme-color" content="#c8f060">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StallTrack">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #c8f060;
    --accent2: #60c8f0;
    --danger: #f06060;
    --warning: #f0b860;
    --success: #60f0a0;
    --text: #f0f0f0;
    --text2: #999;
    --text3: #555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* LOGIN */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    padding: 20px;
  }
  .login-box {
    width: 100%;
    max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
  }
  .login-logo {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .login-sub { color: var(--text2); margin-bottom: 32px; font-size: 13px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 14px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 20px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-primary { background: var(--accent); color: #0f0f0f; width: 100%; }
  .btn-primary:hover { background: #d4f572; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-success { background: var(--success); color: #0f0f0f; }
  .btn-sm { padding: 7px 12px; font-size: 12px; }
  .error-msg { color: var(--danger); font-size: 12px; margin-top: 8px; }

  /* APP LAYOUT */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-logo { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent); font-size: 18px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .logout-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 4px 8px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    gap: 3px;
    transition: color 0.15s;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 20px; height: 20px; }

  .main-content {
    flex: 1;
    padding: 20px 16px 90px;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
  }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* DASHBOARD */
  .page-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .page-sub { color: var(--text2); font-size: 13px; margin-bottom: 20px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .stat-value { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.danger { color: var(--danger); }
  .stat-value.warning { color: var(--warning); }

  /* STALL CARDS */
  .stall-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .stall-card:hover { border-color: var(--accent); }
  .stall-card.vacant { opacity: 0.6; }
  .stall-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .stall-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
  .stall-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }
  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .badge-occupied { background: rgba(96,240,160,0.15); color: var(--success); }
  .badge-vacant { background: rgba(240,96,96,0.1); color: var(--text3); }
  .badge-overdue { background: rgba(240,96,96,0.15); color: var(--danger); }
  .badge-paid { background: rgba(96,240,160,0.15); color: var(--success); }
  .badge-pending { background: rgba(240,184,96,0.15); color: var(--warning); }
  .badge-booked { background: rgba(240,184,96,0.15); color: var(--warning); }
  .stall-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); margin-top: 4px; }
  .stall-row span:last-child { color: var(--text); font-family: 'DM Mono', monospace; }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 24px 20px 32px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    margin-bottom: 20px;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions .btn { flex: 1; }

  /* PAYMENT HISTORY */
  .payment-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .payment-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .payment-amount { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--accent); font-weight: 500; }
  .payment-date { font-size: 12px; color: var(--text2); }
  .payment-meta { font-size: 12px; color: var(--text2); }
  .payment-ref { font-family: 'DM Mono', monospace; color: var(--text); }

  /* UTILITY */
  .utility-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .util-left { font-size: 13px; }
  .util-stall { color: var(--text2); font-size: 11px; margin-top: 2px; }
  .util-amount { font-family: 'DM Mono', monospace; color: var(--warning); }

  /* MAINTENANCE */
  .maint-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .maint-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .maint-title { font-weight: 500; font-size: 14px; }
  .maint-desc { font-size: 12px; color: var(--text2); margin-top: 4px; }

  /* RECEIPT */
  .receipt-box {
    background: #fff;
    color: #111;
    border-radius: 12px;
    padding: 24px 20px;
    font-family: 'DM Mono', monospace;
  }
  .receipt-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: #111; }
  .receipt-title { font-size: 12px; color: #666; margin-bottom: 16px; }
  .receipt-divider { border: none; border-top: 1px dashed #ccc; margin: 12px 0; }
  .receipt-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .receipt-row.total { font-weight: 700; font-size: 15px; color: #000; border-top: 2px solid #111; padding-top: 10px; margin-top: 6px; }
  .receipt-footer { text-align: center; font-size: 11px; color: #888; margin-top: 16px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .empty-state { text-align: center; color: var(--text3); padding: 40px 20px; font-size: 13px; }
  .empty-state .icon { font-size: 32px; margin-bottom: 10px; }

  select option { background: #1a1a1a; }
</style>
</head>

  <div style="font-size:36px;">🏪</div>
  <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--accent);">StallTrack</div>
